<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructed Futures -- Conceptual Map</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --bg-grid: #e8e6e1;
    --stroke: #2c2c2c;
    --stroke-light: #8a8a8a;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;

    --fc-fill: #dbeafe;
    --fc-stroke: #3b82f6;
    --fc-text: #1e40af;

    --ai-fill: #f3e8ff;
    --ai-stroke: #a855f7;
    --ai-text: #6b21a8;

    --clt-fill: #dcfce7;
    --clt-stroke: #22c55e;
    --clt-text: #166534;

    --cda-fill: #fef3c7;
    --cda-stroke: #f59e0b;
    --cda-text: #92400e;

    --rq-fill: #ffe4e6;
    --rq-stroke: #f43f5e;
    --rq-text: #9f1239;

    --theme-fill: #f0f9ff;
    --theme-stroke: #0ea5e9;
    --theme-text: #0c4a6e;

    --hand: 'Caveat', cursive;
    --sans: 'DM Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    overflow: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 10px;
    max-width: 900px;
  }
  .header h1 {
    font-family: var(--hand);
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
  }
  .header p {
    font-family: var(--hand);
    font-size: 1.2rem;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* Canvas container */
  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 1400px;
    padding: 0 20px 60px;
  }
  .canvas-wrap svg {
    width: 100%;
    height: auto;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: #1a1a1a;
    color: #f5f5f5;
    font-family: var(--sans);
    font-size: 0.82rem;
    line-height: 1.5;
    padding: 12px 16px;
    border-radius: 8px;
    max-width: 340px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  }
  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .tooltip .tt-title {
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 0.88rem;
  }
  .tooltip .tt-body {
    margin-bottom: 4px;
  }
  .tooltip .tt-source {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: #aaa;
    margin-top: 6px;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px 28px;
    justify-content: center;
    padding: 16px 20px;
    max-width: 900px;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--hand);
    font-size: 1.05rem;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
  }

  /* Interactive hint */
  .hint {
    font-family: var(--hand);
    font-size: 1rem;
    color: var(--text-muted);
    text-align: center;
    padding-bottom: 10px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header h1 { font-size: 1.6rem; }
    .header p { font-size: 1rem; }
    .legend { gap: 10px 18px; }
    .legend-item { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Constructed Futures, Constrained Imaginations</h1>
  <p>AI Imaginaries and Futures Consciousness in Sustainability Discourse</p>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background: var(--fc-fill); border-color: var(--fc-stroke);"></div>
    Futures Consciousness
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background: var(--ai-fill); border-color: var(--ai-stroke);"></div>
    AI Imaginaries
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background: var(--clt-fill); border-color: var(--clt-stroke);"></div>
    Complexity Leadership
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background: var(--cda-fill); border-color: var(--cda-stroke);"></div>
    CDA Methodology
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background: var(--rq-fill); border-color: var(--rq-stroke);"></div>
    Research Questions
  </div>
</div>

<p class="hint">Hover over elements to explore</p>

<div class="canvas-wrap">

    <filter id="sketch-text" x="-1%" y="-1%" width="102%" height="102%">

    <!-- Arrow markers -->

    <marker id="arrow-ai" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">

<div id="tooltip" class="tooltip">
  <div class="tt-title"></div>
  <div class="tt-body"></div>
  <div class="tt-source"></div>
</div>

<script>
const tooltipData = {
  'theme-purpose': {
    title: 'Theme & Purpose',
    body: 'AI enables 134 SDG targets yet inhibits 59 (Vinuesa et al., 2020). This thesis investigates the imaginative dimension: how leaders envision AI\'s role in sustainable futures, and how those visions shape their orientations and practices.',
    source: 'Vinuesa et al. (2020); Jasanoff & Kim (2015)'
  },
  'fc-main': {
    title: 'Futures Consciousness (Primary Analytical Lens)',
    body: 'A psychological capacity for engaging meaningfully with the future. Unlike strategic foresight (what organisations do), FC describes what individuals ARE. Five validated dimensions serve as the individual-level construct for analysing how leaders imaginatively engage with AI discourse.',
    source: 'Ahvenharju et al. (2018); Lalot et al. (2021)'
  },
  'fc-time': {
    title: 'Time Perspective',
    body: 'The temporal scope of discourse: does it extend beyond immediate returns? When AI-sustainability discourse narrows temporal horizons to quarterly gains, it suppresses this dimension.',
    source: 'Ahvenharju et al. (2018), Dimension 1'
  },
  'fc-agency': {
    title: 'Agency Beliefs',
    body: 'Beliefs about one\'s capacity to influence the future. When AI is framed as an autonomous force ("AI will..."), human agency is discursively suppressed. When framed as a tool ("we can use AI to..."), agency is activated.',
    source: 'Ahvenharju et al. (2018), Dimension 2'
  },
  'fc-openness': {
    title: 'Openness to Alternatives',
    body: 'Willingness to consider genuinely different futures. The "there is no alternative" (TINA) rhetoric around AI adoption directly constrains this dimension, foreclosing transformative possibilities.',
    source: 'Ahvenharju et al. (2018), Dimension 3'
  },
  'fc-systems': {
    title: 'Systems Perception',
    body: 'Awareness of interconnections, feedback loops, and emergent properties. AI-sustainability discourse that isolates efficiency gains from rebound effects (Jevons paradox) demonstrates suppressed systems perception.',
    source: 'Ahvenharju et al. (2018), Dimension 4'
  },
  'fc-concern': {
    title: 'Concern for Others',
    body: 'Ethical orientation toward future generations and affected communities. The Brundtland definition itself embeds this dimension. Discourse that centres shareholder value over intergenerational equity suppresses it.',
    source: 'Ahvenharju et al. (2018), Dimension 5; WCED (1987)'
  },
  'ai-main': {
    title: 'AI Imaginaries (Classification Framework)',
    body: 'Collectively held, institutionally stabilised visions of AI futures. These are not merely speculative but constitutive: they shape what becomes thinkable. Organised along two dimensions: valence (utopian/dystopian) and orientation to change (instrumental/transformative).',
    source: 'Jasanoff & Kim (2015); Hultin & Mahring (2025)'
  },
  'ai-iu': {
    title: 'Instrumental-Utopian',
    body: '"AI will optimise sustainability." Positions AI as a solution provider within existing structures. The dominant corporate imaginary found by Zechiel et al. (2024) across 244 AI-for-sustainability initiatives. Centres technical efficiency, not systemic reimagination.',
    source: 'Zechiel et al. (2024)'
  },
  'ai-id': {
    title: 'Instrumental-Dystopian',
    body: '"AI will entrench inequalities." Warns that AI deepens existing power asymmetries, concentrates resources in technology-producing nations, and accelerates resource consumption through rebound effects. Still works within existing system logic.',
    source: 'Vinuesa et al. (2020); Alcott (2005)'
  },
  'ai-tu': {
    title: 'Transformative-Utopian',
    body: '"AI can help reimagine our relationship with ecological systems." Positions AI as enabling fundamentally new ways of knowing, relating, and organising. Uncertainty as generative space for imagination, not a problem to optimise away.',
    source: 'Hultin & Mahring (2025); Gumuesay & Reinecke (2022)'
  },
  'ai-td': {
    title: 'Transformative-Dystopian',
    body: '"AI will fundamentally alter what it means to be human in relation to nature." Warns of deep ontological shifts: the replacement of relational knowing with prediction, the erosion of embodied ecological understanding.',
    source: 'Hultin & Mahring (2025)'
  },
  'clt-main': {
    title: 'Complexity Leadership Theory',
    body: 'Conceptualises leadership as three interacting functions rather than individual traits. This study focuses on the operational-enabling spectrum: from AI for incremental optimisation to AI for reimagining organisational purpose.',
    source: 'Uhl-Bien et al. (2007); Uhl-Bien & Arena (2018)'
  },
  'clt-operational': {
    title: 'Operational Leadership',
    body: 'Managing formal structures, planning, coordinating. When discourse frames AI solely as an efficiency tool, it naturalises operational leadership as the appropriate response to sustainability challenges.',
    source: 'Uhl-Bien & Arena (2018)'
  },
  'clt-adaptive': {
    title: 'Adaptive Spaces',
    body: 'Environments where entrepreneurial and operational dynamics interact to produce emergent innovation. Futures-conscious leaders create these spaces rather than defaulting to efficiency-driven AI applications.',
    source: 'Uhl-Bien & Arena (2018)'
  },
  'clt-enabling': {
    title: 'Enabling Leadership',
    body: 'Creating conditions for transformative emergence. Using AI to reimagine organisational purpose, enable systemic transformation, and cultivate adaptive spaces where new sustainability futures can be imagined.',
    source: 'Uhl-Bien & Arena (2018)'
  },
  'convergence': {
    title: 'Analytical Convergence',
    body: 'The three theories converge: AI imaginaries (collective visions) activate or constrain FC dimensions (individual capacity), which corresponds to leadership orientations (organisational function). CDA traces these connections across textual, discursive, and social practice levels.',
    source: 'Integrated framework'
  },
  'cda-main': {
    title: 'Critical Discourse Analysis',
    body: 'Fairclough\'s three-dimensional framework provides the methodology to trace how imaginaries construct FC patterns and naturalise leadership orientations. Chosen because it examines language as constitutive of social reality, not merely reflective of it.',
    source: 'Fairclough (1992)'
  },
  'cda-text': {
    title: 'Textual Level',
    body: 'Vocabulary, modality, and transitivity patterns identify which imaginary categories are constructed in the discourse. E.g., "AI will solve" (high modality, AI as agent) vs. "we might explore" (hedged modality, human agency). Maps to the 4-category typology.',
    source: 'Fairclough (1992), Level 1'
  },
  'cda-discursive': {
    title: 'Discursive Practice Level',
    body: 'Traces how FC dimensions are invoked, marginalised, or absent. E.g., when temporal scope is narrowed ("this quarter") or agency displaced ("AI will determine"), specific FC dimensions are suppressed in the discourse.',
    source: 'Fairclough (1992), Level 2'
  },
  'cda-social': {
    title: 'Social Practice Level',
    body: 'Identifies which leadership orientations are naturalised or foreclosed. When operational efficiency becomes the "common sense" of AI-sustainability discourse, enabling leadership is delegitimised as impractical idealism.',
    source: 'Fairclough (1992), Level 3'
  },
  'data-youtube': {
    title: 'YouTube Corpus (Formal-Institutional)',
    body: '8-10 webinars and panel discussions where sustainability leaders (directors, CIOs) discuss AI strategy. Selected via keyword search, filtered for named organisational roles. Transcripts manually verified against auto-generated captions for modality/hedging accuracy.',
    source: 'Snelson (2016); 2022-2026 timeframe'
  },
  'data-reddit': {
    title: 'Reddit Corpus (Informal-Public)',
    body: '8-10 threads from r/sustainability and r/FutureStudies with sustained, multi-perspective engagement. Posts paraphrased (not quoted verbatim) to prevent re-identification through search. Captures naturalistic discourse without researcher prompts.',
    source: 'Proferes et al. (2021); 2022-2026 timeframe'
  },
  'rq1': {
    title: 'RQ1: FC Dimensions in Discourse',
    body: 'How are the dimensions of futures consciousness discursively represented or suppressed in online AI-sustainability discourse? Answered primarily through textual and discursive practice analysis.',
    source: 'Ahvenharju et al. (2018) + Fairclough (1992)'
  },
  'rq2': {
    title: 'RQ2: Leadership Orientations',
    body: 'How does the discursive framing of AI for sustainability construct particular leadership orientations along the operational-enabling spectrum? RQ1 feeds into RQ2: suppressing FC dimensions IS the mechanism that naturalises operational orientations.',
    source: 'Uhl-Bien & Arena (2018) + Fairclough (1992)'
  },
  'key-insight': {
    title: 'Core Argument',
    body: 'The three-level CDA analysis traces a chain: when discourse suppresses openness to alternatives or narrows temporal scope (FC), it simultaneously constitutes conditions under which operational leadership appears natural and enabling leadership appears impractical (CLT). The imaginaries are the vehicle; FC suppression is the mechanism; constrained leadership is the outcome.',
    source: 'Integrated analytical framework'
  }
};

// Tooltip elements
const tooltipEl = document.getElementById('tooltip');
const ttTitle = tooltipEl.querySelector('.tt-title');
const ttBody = tooltipEl.querySelector('.tt-body');
const ttSource = tooltipEl.querySelector('.tt-source');

document.querySelectorAll('.node').forEach(function(node) {
  node.style.cursor = 'pointer';

  node.addEventListener('mouseenter', function(e) {
    var key = node.dataset.tooltip;
    var data = tooltipData[key];
    if (!data) return;

    // Highlight effect
    var rect = node.querySelector('rect');
    if (rect) {
      rect.style.transition = 'filter 0.2s';
      rect.style.filter = 'brightness(1.05) drop-shadow(0 2px 8px rgba(0,0,0,0.12))';
    }

    ttTitle.textContent = data.title;
    ttBody.textContent = data.body;
    ttSource.textContent = data.source;
    tooltipEl.classList.add('visible');
  });

  node.addEventListener('mousemove', function(e) {
    var pad = 16;
    var x = e.clientX + pad;
    var y = e.clientY + pad;

    var rect = tooltipEl.getBoundingClientRect();
    if (x + rect.width > window.innerWidth - pad) {
      x = e.clientX - rect.width - pad;
    }
    if (y + rect.height > window.innerHeight - pad) {
      y = e.clientY - rect.height - pad;
    }

    tooltipEl.style.left = x + 'px';
    tooltipEl.style.top = y + 'px';
  });

  node.addEventListener('mouseleave', function() {
    var rect = node.querySelector('rect');
    if (rect) {
      rect.style.filter = '';
    }
    tooltipEl.classList.remove('visible');
  });
});

// Keyboard accessibility
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    tooltipEl.classList.remove('visible');
  }
});
</script>
